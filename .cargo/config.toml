# Cargo configuration for vpid
# 使用 lld 链接器加速构建过程

[target.x86_64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.i686-pc-windows-msvc]
linker = "rust-lld"
