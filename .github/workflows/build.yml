name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          # install-qt-action 默认包含 qtbase+qtdeclarative+qttools 等桌面必需组件

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Check
        run: cargo check --all-targets

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-x86_64
          path: target/release/vpid

  # ── Windows x86 (XP 兼容版 Qt) ─────────────────────────────────
  build-windows:
    name: Windows x86 (XP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: i686-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      # 下载社区 XP 兼容版 Qt 6.5 预构建二进制 (x86)
      # 来源: https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip
      - name: Download Qt 6.5 XP (x86)
        run: |
          $qtUrl = "https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip"
          $outDir = "$env:GITHUB_WORKSPACE\Qt"
          $zipPath = "$env:GITHUB_WORKSPACE\qt_xp.zip"
          Invoke-WebRequest -Uri $qtUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $outDir
          Remove-Item $zipPath
          # 查找解压后的 Qt 目录并设置环境变量
          $qtRoot = Get-ChildItem -Path $outDir -Directory -Recurse -Filter "Qt6Config.cmake" | Select-Object -First 1 | ForEach-Object { $_.FullName.Replace("\lib\cmake\Qt6", "") }
          if (-not $qtRoot) {
            # 如果找不到 cmake 目录，列出结构
            Get-ChildItem -Path $outDir -Recurse -Depth 2 | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Output "Qt root: $qtRoot"
          echo "Qt6_DIR=$qtRoot\lib\cmake\Qt6" >> $env:GITHUB_ENV
          echo "QT_PLUGIN_PATH=$qtRoot\plugins" >> $env:GITHUB_ENV

      - name: Configure Cargo for x86
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.i686-pc-windows-msvc]
          linker = "rust-lld"
          EOF

      - name: Build
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-windows-x86
          path: target/i686-pc-windows-msvc/release/vpid.exe

  # ── macOS (x86_64 + arm64) ───────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/vpid

  # ── Linux ARM64 (交叉编译) ───────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Configure Cargo for cross-compilation
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/vpid

  # ── Clippy ───────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Format ───────────────────────────────────────────────────
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check format
        run: cargo fmt -- --check
