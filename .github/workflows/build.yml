name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux x86_64 (AppImage) ──────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          # install-qt-action 默认包含 qtbase+qtdeclarative+qttools 等桌面必需组件

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential appstream

      - name: Check
        run: cargo check --all-targets

      - name: Build
        run: cargo build --release

      - name: Package AppImage
        run: |
          # 下载 linuxdeploy 和 Qt 插件
          wget -qO linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          wget -qO qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x qt

          # 创建 AppDir 结构
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          # 复制二进制文件
          cp target/release/vpid AppDir/usr/bin/

          # 创建桌面文件
          cat > AppDir/usr/share/applications/vpid.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=vpid
          GenericName=USB Device Viewer
          Comment=USB设备查看器
          Exec=vpid
          Icon=vpid
          Categories=Development;Utility;
          EOF

          # 创建 AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/vpid" "$@"
          EOF
          chmod +x AppDir/AppRun

          # 使用项目图标（如果存在）或创建默认图标
          if [ -f vpid-ui.jpg ]; then
            convert vpid-ui.jpg -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/vpid.png 2>/dev/null || true
          fi

          # 打包 AppImage
          export OUTPUT=vpid-linux-x86_64.AppImage
          export QMAKE=$(find /home/runner/work -path '*/Qt/6*/gcc_64/bin/qmake' 2>/dev/null | head -1)
          ./linuxdeploy --appdir=AppDir --plugin=qt --desktop-file=AppDir/usr/share/applications/vpid.desktop --output=appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-x86_64
          path: vpid-linux-x86_64.AppImage

  # ── Windows x86 (XP 兼容版 Qt) ─────────────────────────────────
  build-windows:
    name: Windows x86 (XP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Verify target installed
        run: rustup target list --installed | grep i686-pc-windows-msvc || (rustup target add i686-pc-windows-msvc)

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86

      # 下载社区 XP 兼容版 Qt 6.5 预构建二进制 (x86)
      # 来源: https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip
      - name: Download Qt 6.5 XP (x86)
        run: |
          $qtUrl = "https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip"
          $outDir = "$env:GITHUB_WORKSPACE\Qt"
          $zipPath = "$env:GITHUB_WORKSPACE\qt_xp.zip"
          Invoke-WebRequest -Uri $qtUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $outDir
          Remove-Item $zipPath
          # 解压后结构为 Qt/x86/，直接使用该路径
          $qtRoot = "$outDir\x86"
          if (-not (Test-Path "$qtRoot\lib")) {
            Get-ChildItem -Path $outDir -Directory | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Output "Qt root: $qtRoot"
          echo "Qt6_DIR=$qtRoot\lib\cmake\Qt6" >> $env:GITHUB_ENV
          echo "QT_PLUGIN_PATH=$qtRoot\plugins" >> $env:GITHUB_ENV
          echo "$qtRoot\bin" >> $env:GITHUB_PATH

      - name: Configure Cargo for x86
        shell: bash
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.i686-pc-windows-msvc]
          linker = "rust-lld"
          EOF

      - name: Build
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Deploy Qt
        run: |
          $binPath = "target/i686-pc-windows-msvc/release/vpid.exe"
          $deployDir = "dist/vpid-windows-x86-xp"
          mkdir -p $deployDir
          Copy-Item $binPath $deployDir\vpid.exe
          # windeployqt 自动收集所需 Qt DLL、plugins、qml 等
          windeployqt --release --no-translations --no-system-d3d-compiler $deployDir\vpid.exe

      - name: Package
        run: |
          Compress-Archive -Path dist/vpid-windows-x86-xp -DestinationPath dist/vpid-windows-x86-xp.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-windows-x86-xp
          path: dist/vpid-windows-x86-xp.zip

  # ─ macOS (x86_64 + arm64) ───────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Deploy Qt
        run: |
          mkdir -p dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/vpid dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          chmod +x dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          # macdeployqt 自动打包 Qt Framework 和 plugins
          macdeployqt dist/vpid-macos-${{ matrix.target }}.app -dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-${{ matrix.target }}
          path: dist/vpid-macos-${{ matrix.target }}.dmg

  # ── Linux ARM64 (AppImage) ───────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static

      - uses: Swatinem/rust-cache@v2

      - name: Verify target installed
        run: rustup target list --installed | grep aarch64-unknown-linux-gnu || rustup target add aarch64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/vpid

  # ── Clippy ───────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Format ───────────────────────────────────────────────────
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check format
        run: cargo fmt -- --check
