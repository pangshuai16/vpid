name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  QT_VERSION: '6.5.3'

jobs:
  # ── Linux x86_64 (静态链接 Qt) ──────────────────────────────────
  build-linux:
    name: Linux x86_64 Static
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Restore static Qt cache
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: /opt/qt6-static
          key: qt6-static-${{ env.QT_VERSION }}-linux-x64

      - name: Build static Qt (if cache miss)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build python3 perl \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev \
            libfontconfig1-dev libfreetype6-dev libx11-dev \
            libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-util-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-x11-dev libatspi2.0-dev libcups2-dev \
            libdrm-dev libegl1-mesa-dev libnss3-dev libdbus-1-dev

          pip install aqtinstall
          mkdir -p ~/qt-src && cd ~/qt-src
          aqt install-src linux desktop ${{ env.QT_VERSION }} --archives qtbase qtdeclarative qtquickcontrols2 qttools qtsvg

          mkdir -p ~/qt-build && cd ~/qt-build
          ~/qt-src/${{ env.QT_VERSION }}/src/configure \
            -static -release -prefix /opt/qt6-static \
            -nomake tests -nomake examples \
            -skip qtwebengine -skip qtwebview -skip qtwayland -skip qtdoc \
            -qt-libpng -qt-libjpeg -qt-zlib -qt-pcre -qt-harfbuzz -qt-freetype \
            -no-feature-sql -no-feature-testlib \
            -feature-eglfs -feature-linuxfb -bundled-xcb-xinput

          cmake --build . --parallel $(nproc)
          sudo cmake --install .

      - name: Check
        run: cargo check --all-targets
        env:
          QMAKE: /opt/qt6-static/bin/qmake
          QT_LIBRARY_PATH: /opt/qt6-static/lib
          QT_INCLUDE_PATH: /opt/qt6-static/include

      - name: Build static binary
        run: cargo build --release
        env:
          QMAKE: /opt/qt6-static/bin/qmake
          QT_LIBRARY_PATH: /opt/qt6-static/lib
          QT_INCLUDE_PATH: /opt/qt6-static/include
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Verify static linking
        run: |
          echo "=== 检查动态依赖 ==="
          ldd target/release/vpid || true
          echo "=== 文件大小 ==="
          ls -lh target/release/vpid

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-x86_64
          path: target/release/vpid

  # ── Windows x86 (XP 兼容版 Qt 静态链接) ────────────────────────
  build-windows:
    name: Windows x86 (XP) Static
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Verify target installed
        run: rustup target list --installed | grep i686-pc-windows-msvc || (rustup target add i686-pc-windows-msvc)

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86-static

      - name: Download Qt 6.5 XP (x86)
        run: |
          $qtUrl = "https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip"
          $outDir = "$env:GITHUB_WORKSPACE\Qt"
          $zipPath = "$env:GITHUB_WORKSPACE\qt_xp.zip"
          Invoke-WebRequest -Uri $qtUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $outDir
          Remove-Item $zipPath
          $qtRoot = "$outDir\x86"
          if (-not (Test-Path "$qtRoot\lib")) {
            Get-ChildItem -Path $outDir -Directory | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Output "Qt root: $qtRoot"
          # 设置环境变量指向静态 Qt
          echo "QMAKE=$qtRoot\bin\qmake.exe" >> $env:GITHUB_ENV
          echo "QT_LIBRARY_PATH=$qtRoot\lib" >> $env:GITHUB_ENV
          echo "QT_INCLUDE_PATH=$qtRoot\include" >> $env:GITHUB_ENV
          echo "$qtRoot\bin" >> $env:GITHUB_PATH

      - name: Configure Cargo for x86 static
        shell: bash
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.i686-pc-windows-msvc]
          linker = "rust-lld"
          rustflags = ["-C", "target-feature=+crt-static"]
          EOF

      - name: Build static binary
        run: cargo build --release --target i686-pc-windows-msvc
        env:
          QMAKE: ${{ env.QMAKE }}
          QT_LIBRARY_PATH: ${{ env.QT_LIBRARY_PATH }}
          QT_INCLUDE_PATH: ${{ env.QT_INCLUDE_PATH }}

      - name: Verify static linking
        run: |
          $binPath = "target/i686-pc-windows-msvc/release/vpid.exe"
          echo "=== 检查依赖 ==="
          dumpbin /dependents $binPath
          echo "=== 文件大小 ==="
          Get-Item $binPath | Select-Object Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-windows-x86-xp
          path: target/i686-pc-windows-msvc/release/vpid.exe

  # ── macOS (x86_64 + arm64) ───────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Deploy Qt
        run: |
          mkdir -p dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/vpid dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          chmod +x dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          macdeployqt dist/vpid-macos-${{ matrix.target }}.app -dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-${{ matrix.target }}
          path: dist/vpid-macos-${{ matrix.target }}.dmg

  # ── Linux ARM64 (交叉编译) ───────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binutils-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Verify target installed
        run: rustup target list --installed | grep aarch64-unknown-linux-gnu || rustup target add aarch64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/vpid

  # ── Clippy ───────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Format ───────────────────────────────────────────────────
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check format
        run: cargo fmt -- --check
