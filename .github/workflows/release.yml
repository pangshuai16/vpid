# Release CI — 推送 v* 标签时自动构建并发布
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt 5.15
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          archives: 'qtbase qtdeclarative qttools icu'

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist/vpid-linux-x86_64/lib dist/vpid-linux-x86_64/plugins/platforms
          cp target/release/vpid dist/vpid-linux-x86_64/
          # 复制 Qt 运行时库
          QT_LIB_DIR=$(find /home/runner/work -path '*/Qt/5*/gcc_64/lib' -type d 2>/dev/null | head -1)
          if [ -z "$QT_LIB_DIR" ]; then
            QT_LIB_DIR=$(find /opt -path '*/Qt/5*/gcc_64/lib' -type d 2>/dev/null | head -1)
          fi
          if [ -n "$QT_LIB_DIR" ]; then
            cp "$QT_LIB_DIR"/libQt5{Core,Gui,Widgets,Qml,Quick,Network,DBus}* dist/vpid-linux-x86_64/lib/ 2>/dev/null || true
          fi
          # 复制 Qt platform plugins
          QT_PLUGINS_DIR=$(find /home/runner/work -path '*/Qt/5*/gcc_64/plugins' -type d 2>/dev/null | head -1)
          if [ -z "$QT_PLUGINS_DIR" ]; then
            QT_PLUGINS_DIR=$(find /opt -path '*/Qt/5*/gcc_64/plugins' -type d 2>/dev/null | head -1)
          fi
          if [ -n "$QT_PLUGINS_DIR" ]; then
            cp "$QT_PLUGINS_DIR"/platforms/libqxcb* dist/vpid-linux-x86_64/plugins/platforms/ 2>/dev/null || true
          fi
          # 创建启动脚本
          cat > dist/vpid-linux-x86_64/run.sh << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="$DIR/plugins"
          exec "$DIR/vpid" "$@"
          SCRIPT
          chmod +x dist/vpid-linux-x86_64/run.sh
          cd dist && tar czf vpid-linux-x86_64.tar.gz vpid-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-x86_64
          path: dist/vpid-linux-x86_64.tar.gz

  # ── Windows x86 (XP 兼容版 Qt 5.15) ───────────────────────────
  build-windows:
    name: Windows x86 (XP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Verify target installed
        run: rustup target list --installed | grep i686-pc-windows-msvc || (rustup target add i686-pc-windows-msvc)

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86

      # 下载社区 XP 兼容版 Qt 5.15 预构建二进制 (x86)
      # 来源: https://github.com/Fsu0413/QtCompileProject
      - name: Download Qt 5.15 XP (x86)
        run: |
          $qtUrl = "https://github.com/Fsu0413/QtCompileProject/releases/download/5.15.17-Windows-x86_64-MinGW8.1.0-staticFull/5.15.17-Windows-x86_64-MinGW8.1.0-staticFull.7z"
          $outDir = "$env:GITHUB_WORKSPACE\Qt"
          $zipPath = "$env:GITHUB_WORKSPACE\qt_xp.7z"
          Invoke-WebRequest -Uri $qtUrl -OutFile $zipPath
          # 使用 7z 解压
          & "C:\Program Files\7-Zip\7z.exe" x $zipPath -o"$outDir" -y
          Remove-Item $zipPath
          $qtRoot = "$outDir\5.15.17-Windows-x86_64-MinGW8.1.0-staticFull"
          if (-not (Test-Path "$qtRoot\lib")) {
            Get-ChildItem -Path $outDir -Directory | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Output "Qt root: $qtRoot"
          echo "Qt5_DIR=$qtRoot\lib\cmake\Qt5" >> $env:GITHUB_ENV
          echo "QT_PLUGIN_PATH=$qtRoot\plugins" >> $env:GITHUB_ENV
          echo "$qtRoot\bin" >> $env:GITHUB_PATH

      - name: Configure Cargo for x86
        shell: bash
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.i686-pc-windows-msvc]
          linker = "rust-lld"
          EOF

      - name: Build
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Deploy Qt
        run: |
          $binPath = "target/i686-pc-windows-msvc/release/vpid.exe"
          $deployDir = "dist/vpid-windows-x86-xp"
          mkdir -p $deployDir
          Copy-Item $binPath $deployDir\vpid.exe
          # windeployqt 自动收集所需 Qt DLL、plugins、qml 等
          windeployqt --release --no-translations --no-system-d3d-compiler $deployDir\vpid.exe

      - name: Package
        run: |
          Compress-Archive -Path dist/vpid-windows-x86-xp -DestinationPath dist/vpid-windows-x86-xp.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-windows-x86-xp
          path: dist/vpid-windows-x86-xp.zip

  # ── macOS (x86_64 + arm64) ───────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt 5.15
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          archives: 'qtbase qtdeclarative qttools'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Deploy Qt
        run: |
          mkdir -p dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/vpid dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          chmod +x dist/vpid-macos-${{ matrix.target }}.app/Contents/MacOS/vpid
          # macdeployqt 自动打包 Qt Framework 和 plugins
          macdeployqt dist/vpid-macos-${{ matrix.target }}.app -dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-${{ matrix.target }}
          path: dist/vpid-macos-${{ matrix.target }}.dmg

  # ── Linux ARM64 (交叉编译) ────────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Verify target installed
        run: rustup target list --installed | grep aarch64-unknown-linux-gnu || rustup target add aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Configure Cargo for cross-compilation
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/vpid

  # ── Create Release & Upload Assets ────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-linux-arm64
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vpid-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: vpid ${{ github.ref_name }}
          body: |
            ## vpid ${{ github.ref_name }} — USB 设备查看器

            ### 平台
            - **Linux x86_64**: `vpid-linux-x86_64`
            - **Linux ARM64**: `vpid-linux-arm64`
            - **Windows x86 (XP 兼容)**: `vpid-windows-x86-xp.exe` — 基于 Qt 5.15.17 社区 XP 兼容版，支持 Windows XP 及更高版本
            - **macOS x86_64**: `vpid-macos-x86_64-apple-darwin`
            - **macOS ARM64 (Apple Silicon)**: `vpid-macos-aarch64-apple-darwin`

            ### 技术栈
            - Rust 2021 + nusb (纯 Rust USB 枚举)
            - Qt5.15 Quick (QML) + qmetaobject-rs
            - 纯 Cargo 构建，无需 CMake

            ### 使用说明
            - **Linux x86_64**: 解压后运行 `./run.sh`，已内置 Qt 依赖，开箱即用
            - **Linux ARM64**: 直接运行二进制，需确保系统已安装 Qt 5.15+
            - **Windows x86 (XP 兼容)**: 解压后双击 `vpid.exe`，已内置 Qt DLL，支持 Windows XP 及以上
            - **macOS**: 双击 `.dmg` 文件挂载后拖拽安装，已内置 Qt Framework
          files: artifacts/*
          draft: true
          prerelease: false
