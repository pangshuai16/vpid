# Release CI — 推送 v* 标签时自动构建并发布
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/vpid dist/vpid-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-x86_64
          path: dist/vpid-linux-x86_64

  # ── Windows x86 (XP 兼容版 Qt) ─────────────────────────────────
  build-windows:
    name: Windows x86 (XP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: i686-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      # 下载社区 XP 兼容版 Qt 6.5 预构建二进制 (x86)
      - name: Download Qt 6.5 XP (x86)
        run: |
          $qtUrl = "https://github.com/cxxzhang/qt6_5_for_xp/releases/download/v1.0.0.0/qt6_5_for_xp.zip"
          $outDir = "$env:GITHUB_WORKSPACE\Qt"
          $zipPath = "$env:GITHUB_WORKSPACE\qt_xp.zip"
          Invoke-WebRequest -Uri $qtUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $outDir
          Remove-Item $zipPath
          $qtRoot = Get-ChildItem -Path $outDir -Directory -Recurse -Filter "Qt6Config.cmake" | Select-Object -First 1 | ForEach-Object { $_.FullName.Replace("\lib\cmake\Qt6", "") }
          if (-not $qtRoot) {
            Get-ChildItem -Path $outDir -Recurse -Depth 2 | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Output "Qt root: $qtRoot"
          echo "Qt6_DIR=$qtRoot\lib\cmake\Qt6" >> $env:GITHUB_ENV
          echo "QT_PLUGIN_PATH=$qtRoot\plugins" >> $env:GITHUB_ENV

      - name: Configure Cargo for x86
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.i686-pc-windows-msvc]
          linker = "rust-lld"
          EOF

      - name: Build
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Package
        run: |
          mkdir -p dist
          copy target\i686-pc-windows-msvc\release\vpid.exe dist\vpid-windows-x86-xp.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-windows-x86-xp
          path: dist\vpid-windows-x86-xp.exe

  # ── macOS x86_64 ──────────────────────────────────────────────
  build-macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/vpid dist/vpid-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-x86_64
          path: dist/vpid-macos-x86_64

  # ── macOS Apple Silicon ───────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/vpid dist/vpid-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-macos-arm64
          path: dist/vpid-macos-arm64

  # ── Linux ARM64 (交叉编译) ────────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Configure Cargo for cross-compilation
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/vpid dist/vpid-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid-linux-arm64
          path: dist/vpid-linux-arm64

  # ── Create Release & Upload Assets ────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos-x86_64
      - build-macos-arm64
      - build-linux-arm64
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: vpid ${{ github.ref_name }}
          body: |
            ## vpid ${{ github.ref_name }} — USB 设备查看器

            ### 平台
            - **Linux x86_64**: `vpid-linux-x86_64`
            - **Linux ARM64**: `vpid-linux-arm64`
            - **Windows x86 (XP 兼容)**: `vpid-windows-x86-xp.exe` — 基于 [qt6_5_for_xp](https://github.com/cxxzhang/qt6_5_for_xp)，支持 Windows XP 及更高版本
            - **macOS x86_64**: `vpid-macos-x86_64`
            - **macOS ARM64 (Apple Silicon)**: `vpid-macos-arm64`

            ### 技术栈
            - Rust 2021 + nusb (纯 Rust USB 枚举)
            - Qt6 Quick (QML) + qmetaobject-rs
            - 纯 Cargo 构建，无需 CMake

            ### 使用说明
            - **Linux**: 直接运行二进制，确保已安装 Qt 6.5+
            - **Windows**: 运行 `vpid-windows-x86-xp.exe`，XP 兼容版（32 位），支持 Windows XP 及以上
            - **macOS**: `chmod +x vpid-macos-* && ./vpid-macos-*`，确保已 `brew install qt@6`
          draft: true
          prerelease: false

      - name: Upload release assets
        run: |
          for file in artifacts/*/*; do
            gh release upload ${{ github.ref_name }} "$file" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
